<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <title>Restaurant Ordering App</title>
    </head>
    <body>
        <header>
            <img src="./imgs/header.png" alt="A banner with burger on the right and 'Jimmy's Diner' written on the left">
        </header>
        <main>
            <div id="menu-items">
                
            </div>
            <div class="order-summary" id="order-summary">
                
            </div>
            <div class="payment-modal payment-modal-display" id="payment-modal">
                <form id="payment-modal-form">
                    <h2>Enter card details</h2>
                    <input 
                    type="text" 
                    name="userName" 
                    placeholder="Enter your name" 
                    autocomplete="off" 
                    required>
                    <input 
                    type="number" 
                    name="cardNumber" 
                    class="card-number" 
                    placeholder="Enter your card number" 
                    autocomplete="off" 
                    required>
                    <input 
                    type="password" 
                    name="CVV" 
                    maxlength="3" 
                    pattern="\d{3}" 
                    inputmode="numeric" 
                    placeholder="Enter CVV" 
                    autocomplete="off" 
                    required>
                    <button type="submit" class="modal-pay-btn" id="modal-pay-btn">Pay</button>
                </form>
            </div>
        </main>
        
        <script src="index.js" type="module"></script>
    </body>
</html>
